name: Nuitka macOS Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # 📢 CHANGE 1: Use the macOS runner for native compilation
    runs-on: macos-latest 
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # You might need to install requirements.txt here too
          pip install nuitka zstandard 

      - name: ⚙️ Build macOS Executable with Nuitka-Action
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: src/Shell.py
          mode: onefile
          output-file: nytescript
            
      - name: ⬆️ Upload macOS Artifact (.app)
        uses: actions/upload-artifact@v4
        with:
          name: nytescript-posix-exe
          path: dist/nytescript
